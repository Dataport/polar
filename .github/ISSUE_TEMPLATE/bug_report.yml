name: Bug report
description: Create a bug report to highlight an issue you encountered.
labels: ['bug']
type: Bug
assignees: []

body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  # TODO: Uncomment after migration to vue3 is complete
  #  - type: input
  #    id: version
  #    attributes:
  #      label: Version
  #      description: Which version of POLAR are you using?
  #      placeholder: e.g. 1.0.0
  #    validations:
  #      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem. You can drag and drop images here.

  - type: markdown
    attributes:
      value: |
        ---
        ### Environment
        **Please fill in at least one of the following two sections (Desktop or Smartphone).**

  - type: textarea
    id: desktop
    attributes:
      label: Desktop
      description: Please complete the following information if applicable.
      placeholder: |
        - OS: [e.g. Windows]
        - Browser: [e.g. Chrome, Firefox]
        - Version: [e.g. 1.0.0]

  - type: textarea
    id: smartphone
    attributes:
      label: Smartphone
      description: Please complete the following information if applicable.
      placeholder: |
        - Device: [e.g. iPhone6]
        - OS: [e.g. iOS8.1]
        - Browser: [e.g. stock browser, Safari]
        - Version: [e.g. 1.0.0]

  - type: textarea
    id: additional-context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
