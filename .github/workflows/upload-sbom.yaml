name: Upload SBOM to dependency tracker

# For testing purposes
on: push

# on:
#   push:
#     branches:
#       - next

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dtrack:
    name: Prepare and upload SBOM
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.15.0
          registry-url: https://registry.npmjs.org/
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Generate SBOM
        run: npm sbom --sbom-format cyclonedx --sbom-type library > bom.xml

      - name: Deploy SBOM
        uses: DependencyTrack/gh-upload-sbom@48feab3080ff9e8f51f4d21861d9fc914eb744f5 # v3.1.0
        with:
          serverHostname: ${{ secrets.DEPENDENCYTRACK_SERVER }}
          apiKey: ${{ secrets.DEPENDENCYTRACK_APIKEY }}
          project: ${{ secrets.DEPENDENCYTRACK_PROJECT }}
