version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    target-branch: next
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    cooldown:
      default-days: 7
    commit-message:
      prefix: chore
      include: scope

  - package-ecosystem: npm
    directory: /
    target-branch: next
    schedule:
      interval: weekly
    open-pull-requests-limit: 20
    cooldown:
      default-days: 3
    commit-message:
      prefix: chore
      include: scope
    versioning-strategy: increase
